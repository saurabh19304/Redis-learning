<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Leaderboard</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="container">
    <h1>Leaderboard</h1>

    <section class="card">
      <h2>Top Players</h2>
      <table id="leaderboard-table">
        <thead><tr><th>Rank</th><th>User</th><th>Score</th></tr></thead>
        <tbody></tbody>
      </table>
      <button id="refresh">Refresh</button>
    </section>

    <section class="card">
      <h2>Submit Score</h2>
      <form id="score-form">
        <label>User ID <input name="userId" required /></label>
        <label>Points <input name="points" type="number" required /></label>
        <button type="submit">Submit</button>
      </form>
      <div id="score-result" class="muted"></div>
    </section>

    <section class="card">
      <h2>Post Views (example)</h2>
      <form id="view-form">
        <label>Post ID <input name="postId" required /></label>
        <button type="submit">Add View</button>
      </form>
      <div id="view-result" class="muted"></div>
    </section>

  </main>
  <script src="/app.js"></script>
</body>
</html>
